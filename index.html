<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SyncPlay — Player</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#000000" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />

<style>
  :root {
    --bg: #000000;
    --panel: #16181d;
    --panel-translucent: rgba(20, 21, 26, 0.9);
    --border: #2a2d34;
    --text: #f2f3f5;
    --text-muted: #9a9ea8;
    --accent: #e8a33d;
    --accent-text: #0d0e10;
    --tap: 44px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }

  #video-stage {
    position: relative;
    width: 100%;
    height: 100dvh;
    background: #000;
    touch-action: none;
    user-select: none;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  #brightness-overlay {
    position: absolute;
    inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
  }

  #subtitle-overlay {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 12%;
    text-align: center;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9), 0 0 2px rgba(0,0,0,0.9);
    padding: 0 24px;
    pointer-events: none;
    white-space: pre-line;
    font-weight: 500;
    line-height: 1.4;
  }

  #gesture-indicator {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--panel-translucent);
    border-radius: 12px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 600;
    pointer-events: none;
  }

  #gesture-indicator .icon { font-size: 18px; }

  #center-flash {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--panel-translucent);
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  #center-flash.show { opacity: 1; }

  #top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.75), transparent);
    transition: opacity 0.25s ease;
  }

  #top-bar .room-info {
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    display: inline-block;
  }
  .status-dot.connected { background: #3ecf70; }
  .status-dot.waiting { background: var(--accent); }

  #top-bar .icon-btn-group {
    display: flex;
    gap: 8px;
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.08);
    color: var(--text);
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  #bottom-controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 20px 16px 16px;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    transition: opacity 0.25s ease;
  }

  #controls-overlay.hidden-controls #top-bar,
  #controls-overlay.hidden-controls #bottom-controls {
    opacity: 0;
    pointer-events: none;
  }

  .seek-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .time {
    font-variant-numeric: tabular-nums;
    font-size: 12px;
    color: var(--text-muted);
    min-width: 38px;
  }

  #seek-bar {
    flex: 1;
    accent-color: var(--accent);
    height: var(--tap);
  }

  .transport-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
  }

  .transport-row button {
    background: none;
    border: none;
    color: var(--text);
    font-size: 22px;
    cursor: pointer;
  }

  #play-pause-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--accent-text);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  #empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-align: center;
    padding: 40px;
    background: var(--bg);
  }

  #empty-state h1 {
    font-size: 20px;
    margin: 0;
  }

  #empty-state p {
    color: var(--text-muted);
    font-size: 14px;
    margin: 0;
    max-width: 32ch;
  }

  .file-label {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: var(--tap);
    padding: 0 24px;
    border-radius: 999px;
    background: var(--accent);
    color: var(--accent-text);
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    margin-top: 8px;
  }

  #file-picker, #subtitle-picker {
    position: absolute;
    width: 1px; height: 1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
  }

  #room-panel {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 16px;
  }

  #room-status { font-size: 13px; color: var(--text-muted); }

  #room-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }

  #room-actions button {
    min-height: var(--tap);
    padding: 0 18px;
    border-radius: 999px;
    border: none;
    background: var(--accent);
    color: var(--accent-text);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }

  #join-row { display: flex; gap: 8px; }

  #join-code-input {
    min-height: var(--tap);
    width: 100px;
    padding: 0 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    text-transform: uppercase;
  }

  #join-row button {
    min-height: var(--tap);
    padding: 0 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
  }

  #room-code-display { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  #room-code-text { font-family: monospace; font-size: 16px; letter-spacing: 0.08em; color: var(--accent); }
  #copy-code-btn { min-height: 32px; padding: 0 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text); font-size: 12px; cursor: pointer; }

  #room-members-list {
    font-size: 12px;
    color: var(--text-muted);
  }

  .drawer {
    position: absolute;
    top: 0; right: 0;
    width: min(320px, 85vw);
    height: 100%;
    background: rgba(20, 21, 26, 0.7);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-left: 1px solid rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.25s ease;
    z-index: 20;
  }
  .drawer.open { transform: translateX(0); }

  .drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 14px;
  }

  .drawer-header button {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
  }

  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .chat-msg {
    max-width: 80%;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.4;
  }
  .chat-msg.mine {
    align-self: flex-end;
    background: var(--accent);
    color: var(--accent-text);
  }
  .chat-msg.theirs {
    align-self: flex-start;
    background: rgba(255,255,255,0.08);
  }

  #chat-input-row {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--border);
  }

  #chat-input {
    flex: 1;
    min-height: var(--tap);
    padding: 0 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }

  #chat-send-btn {
    min-height: var(--tap);
    min-width: var(--tap);
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: var(--accent-text);
    font-size: 16px;
    cursor: pointer;
  }

  .subtitle-settings {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .setting-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .setting-row label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .stepper {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .stepper button {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
  }

  .stepper .value {
    min-width: 70px;
    text-align: center;
    font-variant-numeric: tabular-nums;
    font-size: 13px;
  }

  .subtitle-settings .file-label {
    width: 100%;
    margin-top: 0;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #log-drawer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    max-height: 40%;
    background: rgba(20, 21, 26, 0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-top: 1px solid rgba(255,255,255,0.08);
    transform: translateY(100%);
    transition: transform 0.25s ease;
    z-index: 15;
  }
  #log-drawer.open { transform: translateY(0); }

  #event-log {
    height: 160px;
    overflow-y: auto;
    padding: 10px 14px;
    font-family: monospace;
    font-size: 11px;
    line-height: 1.6;
  }
  .log-entry { color: var(--text-muted); white-space: pre-wrap; word-break: break-word; }
  .log-entry:first-child { color: var(--text); }
</style>
</head>
<body>

<div id="video-stage">
  <video id="video" playsinline></video>
  <div id="brightness-overlay"></div>
  <div id="subtitle-overlay"></div>
  <div id="gesture-indicator" hidden>
    <span class="icon" id="gesture-icon">🔊</span>
    <span id="gesture-value">50%</span>
  </div>
  <div id="center-flash">▶</div>

  <div id="controls-overlay">
    <div id="top-bar">
      <div class="room-info">
        <span class="status-dot" id="status-dot-me"></span>
        <span id="room-code-mini">No room</span>
      </div>
      <div class="icon-btn-group">
        <button class="icon-btn" id="log-toggle-btn" title="Debug log">🐞</button>
        <button class="icon-btn" id="room-panel-btn" title="Room">🚪</button>
        <button class="icon-btn" id="subtitle-panel-btn" title="Subtitles">💬</button>
        <button class="icon-btn" id="chat-toggle-btn" title="Chat">✉️</button>
        <button class="icon-btn" id="fullscreen-btn" title="Fullscreen">⛶</button>
      </div>
    </div>

    <div id="bottom-controls">
      <div class="seek-row">
        <span class="time" id="current-time">00:00</span>
        <input type="range" id="seek-bar" value="0" min="0" step="0.1" />
        <span class="time" id="duration">00:00</span>
      </div>
      <div class="transport-row">
        <button id="rewind-btn" aria-label="Rewind 10 seconds">−10</button>
        <button id="play-pause-btn" aria-label="Play">▶</button>
        <button id="forward-btn" aria-label="Forward 10 seconds">+10</button>
      </div>
    </div>
  </div>

  <div id="empty-state">
    <h1>SyncPlay</h1>
    <p>Tap 🚪 above to create or join a room, then choose a video below. Nothing is uploaded — playback stays local.</p>
    <label class="file-label" for="file-picker">Choose Video</label>
    <input type="file" id="file-picker" accept="video/*" />
  </div>

  <div class="drawer" id="room-drawer">
    <div class="drawer-header">
      <span>Room</span>
      <button id="room-close-btn">✕</button>
    </div>
    <div id="room-panel">
      <div id="room-status">Not connected to a room yet.</div>
      <div id="room-actions">
        <button id="create-room-btn">Create Room</button>
        <div id="join-row">
          <input type="text" id="join-code-input" placeholder="Code" maxlength="5" />
          <button id="join-room-btn">Join</button>
        </div>
      </div>
      <div id="room-code-display" hidden>
        <span>Code:</span>
        <strong id="room-code-text"></strong>
        <button id="copy-code-btn">Copy</button>
      </div>
      <div id="room-members-list"></div>
    </div>
  </div>

  <div class="drawer" id="chat-drawer">
    <div class="drawer-header">
      <span>Chat</span>
      <button id="chat-close-btn">✕</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input type="text" id="chat-input" placeholder="Message…" />
      <button id="chat-send-btn">➤</button>
    </div>
  </div>

  <div class="drawer" id="subtitle-drawer">
    <div class="drawer-header">
      <span>Subtitles</span>
      <button id="subtitle-close-btn">✕</button>
    </div>
    <div class="subtitle-settings">
      <label class="file-label" for="subtitle-picker">Load Subtitle File (.srt / .vtt)</label>
      <input type="file" id="subtitle-picker" accept=".srt,.vtt" />

      <div class="toggle-row">
        <label>Subtitles on</label>
        <input type="checkbox" id="subtitle-enabled-toggle" checked />
      </div>

      <div class="setting-row">
        <label>Delay</label>
        <div class="stepper">
          <button id="delay-minus-btn">−100ms</button>
          <span class="value" id="delay-value">0ms</span>
          <button id="delay-plus-btn">+100ms</button>
        </div>
      </div>

      <div class="setting-row">
        <label>Font Size</label>
        <div class="stepper">
          <button id="font-minus-btn">A−</button>
          <span class="value" id="font-value">22px</span>
          <button id="font-plus-btn">A+</button>
        </div>
      </div>
    </div>
  </div>

  <div id="log-drawer">
    <div id="event-log"></div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="videoController.js"></script>
<script src="socketClient.js"></script>
<script src="gestureControls.js"></script>
<script src="subtitleController.js"></script>
<script src="playerUI.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch((err) => {
        console.warn('Service worker registration failed:', err);
      });
    });
  }
</script>
</body>
</html>
